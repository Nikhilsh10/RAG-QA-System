# This workflow installs Python dependencies, runs linting, and runs the test
# suite for the RAG Document Q&A System.

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python setup ─────────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── Dependency caching ───────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Install lightweight test dependencies ────────────────────────────────
      # Heavy ML libraries (torch, faiss, sentence-transformers) are mocked in
      # the test suite, so only the lightweight requirements-test.txt is needed.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      # ── Lint with flake8 (non-blocking) ─────────────────────────────────────
      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build on Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other errors as warnings (non-blocking)
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # ── Run test suite ───────────────────────────────────────────────────────
      - name: Test with pytest
        run: |
          pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing

      # ── Upload coverage report ───────────────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
